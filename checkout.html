<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Checkout - Bayonet Essence</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">
                <h1>Bayonet Essence</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
            </ul>
        </div>
    </nav>

    <div class="checkout-container">
        <h2>Complete Your Order</h2>
        
        <div id="order-summary">
            <!-- Product summary will appear here -->
        </div>
        
        <form id="checkout-form" action="process-order.php" method="POST">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="fullname" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" name="phone" placeholder="+91 XXXXX XXXXX" required>
            </div>
            
            <div class="form-group">
                <label>Shipping Address *</label>
                <textarea name="address" rows="3" placeholder="Enter your complete address with pin code" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Order Notes (Optional)</label>
                <textarea name="notes" rows="2" placeholder="Any special requests?"></textarea>
            </div>
            
            <input type="hidden" name="product" id="product-input">
            <input type="hidden" name="price" id="price-input">
            
            <button type="submit" class="submit-btn">Place Order (₹)</button>
        </form>
    </div>

    <script>
        // Load product details from sessionStorage
        const product = sessionStorage.getItem('selectedProduct');
        const price = sessionStorage.getItem('selectedPrice');
        
        if (!product) {
            window.location.href = 'index.html';
        }
        
        // Display order summary
        const summaryDiv = document.getElementById('order-summary');
        summaryDiv.innerHTML = `
            <strong>📦 Order Summary</strong><br>
            Product: ${product}<br>
            Price: ₹${price}
        `;
        
        // Set hidden form fields
        document.getElementById('product-input').value = product;
        document.getElementById('price-input').value = price;
    </script>
</body>
</html>
